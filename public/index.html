<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0A091A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tasks">
<link rel="manifest" href="/manifest.json">
<title>Tinder for Tasks</title>
<link rel="stylesheet" href="/style.css?v=32">
</head>
<body>
<div id="app">
  <header id="header">
    <div class="badge" id="pending-count">0</div>
    <button class="mode-toggle" id="mode-toggle" aria-label="Mode">TEST</button>
    <div class="header-right">
      <button class="icon-btn" id="next-btn" aria-label="Next card">›</button>
    </div>
  </header>

  <div id="ptr-indicator"><span class="ptr-spinner"></span><span class="ptr-label">Pull to refresh</span></div>
  <main id="stack"></main>

  <div id="empty-state" hidden>
    <div class="empty-inner">
      <div class="check"></div>
      <h2>All Caught Up</h2>
      <p class="dash-sub" id="today-summary">Nothing to review right now</p>
      <div id="activity-list"></div>
    </div>
  </div>

  <div id="proposal-sheet" class="sheet" hidden>
    <div class="sheet-inner edit-inner">
      <h3 id="proposal-title">Send proposal (3 texts)</h3>
      <div class="prop-label">Text 1 — Consultation recap</div>
      <textarea id="prop-text-1" rows="4" placeholder="Hey [First]! Thanks for hopping on the call about [Dog] today. ..."></textarea>
      <div class="char-count" data-target="prop-text-1"></div>
      <div class="prop-label">Text 2 — Pricing & recommendation</div>
      <textarea id="prop-text-2" rows="6"></textarea>
      <div class="char-count" data-target="prop-text-2"></div>
      <div class="prop-label">Text 3 — Instagram</div>
      <textarea id="prop-text-3" rows="2"></textarea>
      <div class="char-count" data-target="prop-text-3"></div>
      <div class="sheet-actions">
        <button class="cancel" id="prop-cancel">Cancel</button>
        <button class="primary" id="prop-send">Send all 3</button>
      </div>
    </div>
  </div>

  <div id="compose-sheet" class="sheet" hidden>
    <div class="sheet-inner edit-inner">
      <h3 id="compose-title">Send message</h3>
      <textarea id="compose-text" rows="4" placeholder="Type or dictate a follow-up…"></textarea>
      <div class="char-count" data-target="compose-text"></div>
      <button id="compose-mic" class="mic-bar" aria-label="Hold to dictate">
        <span class="mic-icon">🎙️</span>
        <span class="mic-label">Hold to talk</span>
        <span class="mic-wave"><i></i><i></i><i></i><i></i><i></i></span>
      </button>
      <div class="sheet-actions">
        <button class="cancel" id="compose-cancel">Cancel</button>
        <button class="primary" id="compose-send">Send</button>
      </div>
    </div>
  </div>

  <div id="summary-sheet" class="sheet" hidden>
    <div class="sheet-inner summary-inner">
      <h3 id="summary-title">Summary</h3>
      <div id="summary-body"></div>
      <button class="cancel" id="summary-close">Close</button>
    </div>
  </div>

  <div id="edit-sheet" class="sheet" hidden>
    <div class="sheet-inner edit-inner">
      <h3>Edit draft</h3>
      <textarea id="edit-text" rows="5"></textarea>
      <div class="char-count" data-target="edit-text"></div>
      <button id="mic-btn" class="mic-bar" aria-label="Hold to dictate">
        <span class="mic-icon">🎙️</span>
        <span class="mic-label">Hold to talk</span>
        <span class="mic-wave"><i></i><i></i><i></i><i></i><i></i></span>
      </button>
      <div class="tag-label">What was off?</div>
      <div class="tags" id="edit-tags">
        <button data-tag="tone">Tone</button>
        <button data-tag="word">Word choice</button>
        <button data-tag="wrong">Wrong info</button>
        <button data-tag="long">Too long</button>
        <button data-tag="short">Too short</button>
        <button data-tag="greeting">"Hey [Name]!"</button>
        <button data-tag="emojis">Too many emojis</button>
        <button data-tag="salesy">Too salesy</button>
        <button data-tag="context">Missing context</button>
      </div>
      <div class="sheet-actions">
        <button class="cancel" id="edit-cancel">Cancel</button>
        <button class="primary" id="edit-send">Send edited</button>
      </div>
    </div>
  </div>


</div>
<script src="/app.js?v=32" type="module"></script>
<script>
// Nuke any old caches on every load + forcibly update the service worker
(async () => {
  if (!("serviceWorker" in navigator)) return;
  try {
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const r of regs) await r.update();
    if (window.caches) {
      const names = await caches.keys();
      await Promise.all(names.map((n) => caches.delete(n)));
    }
  } catch (e) { console.warn("SW reset failed", e); }
})();
</script>
</body>
</html>

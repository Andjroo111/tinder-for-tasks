<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0f0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tasks">
<link rel="manifest" href="/manifest.json">
<title>Tinder for Tasks</title>
<link rel="stylesheet" href="/style.css?v=7">
</head>
<body>
<div id="app">
  <header id="header">
    <div class="badge" id="pending-count">0</div>
    <div class="title">Tasks</div>
    <button class="icon-btn" id="refresh-btn" aria-label="Refresh">↻</button>
  </header>

  <main id="stack"></main>

  <div id="empty-state" hidden>
    <div class="empty-inner">
      <div class="check">✓</div>
      <h2>All Caught Up</h2>
      <section class="dash-block">
        <div class="dash-label">TODAY</div>
        <div class="dash-row" id="auto-send-summary">0 auto-sent · 0 skipped</div>
        <button class="link-btn" id="view-autos">View auto-sends →</button>
      </section>
      <section class="dash-block">
        <div class="dash-label">NEXT UP</div>
        <div id="next-up" class="dash-row muted">No appointments loaded</div>
      </section>
      <section class="dash-block">
        <div class="dash-label">PIPELINE</div>
        <div id="pipeline" class="dash-row muted">—</div>
      </section>
    </div>
  </div>

  <div id="snooze-sheet" class="sheet" hidden>
    <div class="sheet-inner">
      <h3>Remind me…</h3>
      <button data-snooze="later" id="snooze-later">In a bit</button>
      <button data-snooze="afternoon" id="snooze-afternoon">This afternoon</button>
      <button data-snooze="evening" id="snooze-evening">This evening</button>
      <button data-snooze="tomorrow" id="snooze-tomorrow">Tomorrow morning</button>
      <div class="custom-snooze">
        <input id="snooze-custom-hours" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="3" placeholder="Custom hours" aria-label="Custom hours">
        <button data-snooze="custom" class="primary">Snooze</button>
      </div>
      <button class="cancel" data-snooze="cancel">Cancel</button>
    </div>
  </div>

  <div id="edit-sheet" class="sheet" hidden>
    <div class="sheet-inner edit-inner">
      <h3>Edit draft</h3>
      <textarea id="edit-text" rows="5"></textarea>
      <button id="mic-btn" class="mic-bar" aria-label="Hold to dictate">
        <span class="mic-icon">🎙️</span>
        <span class="mic-label">Hold to talk</span>
        <span class="mic-wave"><i></i><i></i><i></i><i></i><i></i></span>
      </button>
      <div class="tag-label">What was off?</div>
      <div class="tags" id="edit-tags">
        <button data-tag="tone">Tone</button>
        <button data-tag="word">Word choice</button>
        <button data-tag="wrong">Wrong info</button>
        <button data-tag="greeting">"Hey [Name]!"</button>
        <button data-tag="emojis">Too many emojis</button>
        <button data-tag="context">Missing context</button>
      </div>
      <div class="sheet-actions">
        <button class="cancel" id="edit-cancel">Cancel</button>
        <button class="primary" id="edit-send">Send edited</button>
      </div>
    </div>
  </div>

  <div id="autos-sheet" class="sheet" hidden>
    <div class="sheet-inner">
      <h3>Auto-sent today</h3>
      <div id="autos-list"></div>
      <button class="cancel" id="autos-close">Close</button>
    </div>
  </div>

  <div id="toast" hidden></div>

</div>
<script src="/app.js?v=7" type="module"></script>
<script>
// Nuke any old caches on every load + forcibly update the service worker
(async () => {
  if (!("serviceWorker" in navigator)) return;
  try {
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const r of regs) await r.update();
    if (window.caches) {
      const names = await caches.keys();
      await Promise.all(names.map((n) => caches.delete(n)));
    }
  } catch (e) { console.warn("SW reset failed", e); }
})();
</script>
</body>
</html>

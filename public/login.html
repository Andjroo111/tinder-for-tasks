<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f0f14">
<title>Sign in · Tasks</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
body {
  margin: 0; background: #0A091A; color: #F8F8F8;
  font-family: "Inter", system-ui, sans-serif;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 20px; position: relative; overflow: hidden;
}
body::before {
  content: ""; position: fixed; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 50% at 20% 0%, rgba(153,69,255,0.18), transparent 60%),
    radial-gradient(ellipse 70% 40% at 90% 110%, rgba(7,237,190,0.12), transparent 60%);
}
.box { max-width: 360px; width: 100%; text-align: center; position: relative; z-index: 1; }
.logo {
  width: 76px; height: 76px; border-radius: 50%;
  background: linear-gradient(135deg, #A0C7FF 0%, #467ED6 30%, #C77DFF 65%, #9945FF 100%);
  padding: 3px;
  margin: 0 auto 24px;
  box-shadow: 0 0 50px rgba(153,69,255,0.4);
}
.logo-inner {
  width: 100%; height: 100%;
  background: #0A091A; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 34px; font-weight: 700; color: #07EDBE;
}
h1 {
  font-family: "Space Grotesk", sans-serif;
  font-size: 26px; font-weight: 700; margin: 0 0 8px;
  background: linear-gradient(90deg, #07EDBE, #C77DFF, #FF7EC0);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}
p { color: rgba(248,248,248,0.55); font-size: 14px; margin: 0 0 28px; }
form { display: flex; flex-direction: column; gap: 12px; }
input {
  background: #1C1B3A; border: 1.5px solid #2C2977;
  border-radius: 14px; padding: 16px; color: #F8F8F8;
  font-size: 16px; font-family: inherit;
}
input:focus { outline: none; border-color: #07EDBE; box-shadow: 0 0 20px rgba(7,237,190,0.2); }
button {
  background: #07EDBE; color: #001814;
  border: none; border-radius: 999px;
  padding: 16px; font-size: 15px; font-weight: 700;
  font-family: inherit; letter-spacing: 0.3px;
  box-shadow: 0 0 24px rgba(7,237,190,0.35);
}
button:active { opacity: 0.85; transform: scale(0.98); }
#err { color: #FF7EC0; font-size: 13px; min-height: 16px; margin-top: 4px; }
</style>
</head>
<body>
<div class="box">
  <div class="logo"><div class="logo-inner">✓</div></div>
  <h1>Tinder for Tasks</h1>
  <p>Good Dogz KC · Sign in to continue</p>
  <form id="f" autocomplete="on">
    <input type="text" name="username" value="andrew" autocomplete="username" hidden readonly>
    <input id="pw" type="password" name="password" autocomplete="current-password webauthn" placeholder="Password" required autofocus>
    <button type="submit">Sign in</button>
    <div id="err"></div>
  </form>
</div>
<script>
document.getElementById("f").addEventListener("submit", async (e) => {
  e.preventDefault();
  const pw = document.getElementById("pw").value;
  const err = document.getElementById("err");
  err.textContent = "";
  const res = await fetch("/api/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password: pw }),
  });
  if (res.ok) {
    location.href = "/";
  } else {
    err.textContent = "Wrong password";
  }
});
</script>
</body>
</html>
